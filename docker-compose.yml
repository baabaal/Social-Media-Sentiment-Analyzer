# ============================================================
#  docker-compose.yml
# ============================================================
#  Menjalankan 3 service:
#   - mongo    (database)
#   - backend  (express API)
#   - frontend (React + Nginx)
#
#  Cara pakai:
#    export YOUTUBE_API_KEY=xxx
#    docker-compose up -d --build
# ============================================================

version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: sentiment-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app-net
    # Jangan ekspos port 27017 ke public di production
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sentiment-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/sentiment_analyzer
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - MAX_COMMENTS=${MAX_COMMENTS:-500}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-net
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sentiment-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-net
    ports:
      - "80:80"

volumes:
  mongo_data:

networks:
  app-net:
    driver: bridge
